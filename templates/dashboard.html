<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            /* Orange to Red gradient */
            background: linear-gradient(135deg, #ff9d2e, #c0392b);
            padding: 25px;
        }

        .dashboard {
            width: min(1000px, 95%);
            background: #fff;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 18px 35px rgba(150, 40, 27, 0.3);
        }

        h1 {
            text-align: center;
            color: #b33020;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        thead {
            background: #d35400;
            color: white;
        }

        th,
        td {
            padding: 15px;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #f5c6cb;
        }

        tbody tr:nth-child(even) {
            background: #fff5f2;
        }

        tbody tr:hover {
            background: #ffe3df;
        }

        td a {
            color: #c0392b;
            text-decoration: none;
            word-break: break-word;
        }

        td a:hover {
            text-decoration: underline;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #c0392b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: .3s ease;
        }

        .back-btn:hover {
            background: #962a20;
            transform: translateY(-2px);
        }

        .btn-container {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <h1>URL Dashboard</h1>

        <table>

            <thead>
                <tr>
                    <th>Short Code</th>
                    <th>Original URL</th>
                    <th>Total Clicks</th>
                </tr>
            </thead>

            <tbody>

                {% for code, link in links.items() %}

                <tr>
                    <td>{{ code }}</td>

                    <td>
                        <a href="{{ link.url }}" target="_blank">
                            {{ link.url }}
                        </a>
                    </td>

                    <td>{{ link.clicks }}</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

        <div class="btn-container">
            <a href="/" class="back-btn">← Home</a>
        </div>

    </div>

</body>

</html>
